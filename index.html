<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>amenitiz — career compass</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue:        #507FE6;
    --blue-dark:   #2D58B8;
    --blue-darker: #1A3A8A;
    --blue-light:  #7BA3EF;
    --blue-pale:   #D6E4FB;
    --blue-bg:     #EEF4FF;
    --gold:        #C9A96E;
    --gold-light:  #E8D5B0;
    --white:       #FFFFFF;
    --gray-50:     #F7F9FE;
    --gray-100:    #EBF0FA;
    --gray-200:    #CFDAF5;
    --gray-400:    #8FA6D4;
    --gray-600:    #4A6199;
    --gray-900:    #0D1F4A;
    --font:        'DM Sans', sans-serif;
    --radius:      16px;
    --radius-sm:   10px;
  }

  body {
    font-family: var(--font);
    background: var(--gray-50);
    color: var(--gray-900);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ── LOGIN GATE ── */
  #gate {
    position: fixed; inset: 0; z-index: 1000;
    background: var(--blue-darker);
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  #gate.hidden { display: none; }

  .gate-bg {
    position: absolute; inset: 0; overflow: hidden; pointer-events: none;
  }
  .gate-blob {
    position: absolute; border-radius: 50%;
    background: rgba(255,255,255,0.04);
  }
  .gb1 { width: 400px; height: 320px; top: -80px; left: -60px; border-radius: 60% 40% 70% 30%; }
  .gb2 { width: 280px; height: 220px; bottom: -40px; right: -40px; border-radius: 40% 60% 30% 70%; }
  .gb3 { width: 160px; height: 160px; top: 40%; left: 60%; border-radius: 50%; background: rgba(201,169,110,0.06); }
  .gate-deco-tl {
    position: absolute; top: 32px; left: 32px; opacity: 0.25;
  }
  .gate-deco-br {
    position: absolute; bottom: 32px; right: 32px; opacity: 0.2;
  }

  .gate-card {
    position: relative; z-index: 1;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 40px 36px 36px;
    width: 100%; max-width: 400px;
    backdrop-filter: blur(12px);
    animation: gateIn .4s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes gateIn {
    from { opacity:0; transform: translateY(16px) scale(.98); }
    to   { opacity:1; transform: translateY(0) scale(1); }
  }

  .gate-logo {
    font-size: 18px; font-weight: 300; color: var(--white);
    letter-spacing: -.01em; margin-bottom: 4px;
  }
  .gate-title {
    font-size: 22px; font-weight: 500; color: var(--white);
    margin-bottom: 6px; line-height: 1.2;
  }
  .gate-sub {
    font-size: 13px; color: rgba(255,255,255,0.5);
    margin-bottom: 28px; line-height: 1.5;
  }

  .gate-field { margin-bottom: 14px; }
  .gate-label {
    display: block; font-size: 11px; font-weight: 500;
    text-transform: uppercase; letter-spacing: .07em;
    color: rgba(255,255,255,0.5); margin-bottom: 6px;
  }
  .gate-input {
    width: 100%; padding: 11px 14px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    font-family: var(--font); font-size: 14px;
    color: var(--white);
    outline: none; transition: border-color .15s, background .15s;
  }
  .gate-input::placeholder { color: rgba(255,255,255,0.3); }
  .gate-input:focus {
    border-color: rgba(255,255,255,0.4);
    background: rgba(255,255,255,0.12);
  }
  .gate-input.error { border-color: #F08080; }

  .gate-error {
    font-size: 12px; color: #F08080;
    margin-top: 8px; min-height: 18px;
    display: flex; align-items: center; gap: 5px;
  }
  .gate-error::before { content: ''; display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #F08080; flex-shrink: 0; }
  .gate-error:empty { display: none; }
  .gate-error:empty::before { display: none; }

  .gate-btn {
    width: 100%; margin-top: 20px;
    padding: 13px;
    background: var(--blue);
    border: none; border-radius: 10px;
    font-family: var(--font); font-size: 14px; font-weight: 500;
    color: var(--white); cursor: pointer;
    transition: background .15s, transform .1s;
    letter-spacing: .01em;
  }
  .gate-btn:hover { background: var(--blue-dark); }
  .gate-btn:active { transform: scale(.99); }

  .gate-hint {
    margin-top: 16px; text-align: center;
    font-size: 11.5px; color: rgba(255,255,255,0.3);
    line-height: 1.5;
  }

  /* ── APP (hidden until auth) ── */
  #app { display: none; }
  #app.visible { display: block; }

  /* ── Header ── */
  header {
    background: var(--blue);
    padding: 0;
    position: relative;
    overflow: hidden;
    min-height: 72px;
    display: flex;
    align-items: center;
  }
  .header-bg { position: absolute; inset: 0; pointer-events: none; }
  .blob { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.08); }
  .blob-1 { width: 180px; height: 140px; top: -40px; left: 60px; border-radius: 60% 40% 70% 30%; }
  .blob-2 { width: 120px; height: 100px; top: 10px; right: 200px; border-radius: 40% 60% 30% 70%; }
  .blob-3 { width: 80px; height: 80px; bottom: -20px; right: 80px; border-radius: 50%; }
  .deco-svg { position: absolute; right: 24px; top: 50%; transform: translateY(-50%); opacity: 0.5; }
  .header-inner {
    position: relative; z-index: 1;
    padding: 16px 40px;
    display: flex; align-items: center; justify-content: space-between;
    width: 100%;
  }
  .logo { font-size: 20px; font-weight: 300; color: var(--white); letter-spacing: -.01em; }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .header-tag { font-size: 12px; font-weight: 400; color: rgba(255,255,255,0.7); letter-spacing: .02em; }
  .logout-btn {
    font-size: 11.5px; font-weight: 400; color: rgba(255,255,255,0.5);
    background: none; border: 1px solid rgba(255,255,255,0.2);
    border-radius: 20px; padding: 4px 12px; cursor: pointer;
    font-family: var(--font); transition: all .15s; letter-spacing: .01em;
  }
  .logout-btn:hover { color: var(--white); border-color: rgba(255,255,255,0.5); }

  /* ── Container ── */
  .container { max-width: 1100px; margin: 0 auto; padding: 28px 24px 60px; }

  /* ── Role selector ── */
  .selector-wrap { margin-bottom: 24px; }
  .section-label {
    font-size: 11px; font-weight: 500; text-transform: uppercase;
    letter-spacing: .08em; color: var(--gray-400); margin-bottom: 10px;
  }
  .role-groups { display: flex; flex-direction: column; gap: 8px; }
  .role-group { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .group-tag {
    font-size: 10px; font-weight: 500; text-transform: uppercase;
    letter-spacing: .06em; color: var(--gray-400); min-width: 56px;
  }
  .role-btn {
    padding: 6px 14px; border-radius: 20px; font-size: 12.5px;
    font-family: var(--font); cursor: pointer;
    border: 1.5px solid var(--gray-200); color: var(--gray-600);
    background: var(--white); transition: all .15s; font-weight: 400;
  }
  .role-btn:hover { border-color: var(--blue-light); color: var(--blue); background: var(--blue-bg); }
  .role-btn.active { border-color: var(--blue); background: var(--blue); color: var(--white); font-weight: 500; }

  /* ── Journey card ── */
  .journey-card {
    background: var(--blue); border-radius: var(--radius);
    padding: 20px 24px 18px; margin-bottom: 16px;
    position: relative; overflow: hidden;
  }
  .journey-card .blob { background: rgba(255,255,255,0.06); }
  .journey-card .jb1 { width: 160px; height: 120px; top: -30px; right: 40px; border-radius: 50% 40% 60% 50%; }
  .journey-card .jb2 { width: 80px; height: 80px; bottom: -20px; left: 20px; border-radius: 40% 60% 50% 60%; }
  .journey-deco { position: absolute; right: 20px; bottom: 10px; opacity: 0.3; }
  .journey-label {
    font-size: 11px; font-weight: 500; text-transform: uppercase;
    letter-spacing: .08em; color: rgba(255,255,255,0.6); margin-bottom: 14px;
    position: relative; z-index: 1;
  }
  .journey {
    display: flex; align-items: center; gap: 0;
    overflow-x: auto; padding-bottom: 2px; position: relative; z-index: 1;
  }
  .jstep { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
  .jcircle {
    width: 42px; height: 42px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 500; flex-shrink: 0;
  }
  .j-past    { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.5); border: 1.5px solid rgba(255,255,255,0.2); }
  .j-current { background: var(--white); color: var(--blue); border: 2px solid var(--white); font-weight: 600; }
  .j-next    { background: rgba(255,255,255,0.25); color: var(--white); border: 2px solid rgba(255,255,255,0.5); }
  .j-future  { background: transparent; color: rgba(255,255,255,0.35); border: 1.5px dashed rgba(255,255,255,0.2); }
  .jlabel { font-size: 10px; color: rgba(255,255,255,0.5); text-align: center; margin-top: 6px; max-width: 80px; line-height: 1.3; }
  .jlabel.current { color: var(--white); font-weight: 500; }
  .jlabel.next    { color: rgba(255,255,255,0.75); }
  .jarrow { width: 24px; height: 2px; background: rgba(255,255,255,0.2); flex-shrink: 0; position: relative; margin-bottom: 20px; }
  .jarrow::after { content:''; position: absolute; right: -5px; top: -4px; border-left: 8px solid rgba(255,255,255,0.2); border-top: 5px solid transparent; border-bottom: 5px solid transparent; }
  .jarrow.active { background: rgba(255,255,255,0.5); }
  .jarrow.active::after { border-left-color: rgba(255,255,255,0.5); }

  /* ── Role summary ── */
  .role-summary {
    background: var(--white); border: 1px solid var(--gray-100);
    border-radius: var(--radius-sm); padding: 14px 16px;
    margin-bottom: 16px; font-size: 13.5px; color: var(--gray-600); line-height: 1.6;
    border-left: 3px solid var(--blue);
  }
  .role-summary strong { color: var(--blue-dark); font-weight: 500; display: block; margin-bottom: 3px; }

  /* ── Legend ── */
  .legend {
    display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 14px;
    padding-bottom: 14px; border-bottom: 1px solid var(--gray-100);
  }
  .leg { display: flex; align-items: center; gap: 6px; font-size: 11.5px; color: var(--gray-600); }
  .ldot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

  /* ── Comparison ── */
  .comparison { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .col-header { padding: 10px 14px; border-radius: var(--radius-sm) var(--radius-sm) 0 0; font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: .05em; }
  .col-now  { background: var(--blue); color: var(--white); }
  .col-next { background: var(--blue-pale); color: var(--blue-dark); }
  .col-body { border: 1px solid var(--gray-100); border-top: none; border-radius: 0 0 var(--radius-sm) var(--radius-sm); background: var(--white); }
  .comp-row { padding: 11px 14px; border-bottom: 1px solid var(--gray-100); }
  .comp-row:last-child { border-bottom: none; }
  .comp-name { font-size: 12.5px; font-weight: 500; color: var(--gray-900); margin-bottom: 4px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .comp-desc { font-size: 12px; color: var(--gray-600); line-height: 1.55; }
  .comp-na   { font-size: 12px; color: var(--gray-400); font-style: italic; }
  .badge { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 400; white-space: nowrap; }
  .b-u   { background: var(--blue-bg); color: var(--blue-dark); }
  .b-r   { background: #EDF4FF; color: var(--blue-darker); border: 1px solid var(--blue-pale); }
  .b-s   { background: #FFF8ED; color: #7A4F00; }
  .b-new { background: var(--gold-light); color: #5C3A00; font-weight: 500; }

  @media (max-width: 700px) {
    .comparison { grid-template-columns: 1fr; }
    .header-inner { padding: 14px 20px; }
    .container { padding: 16px 16px 40px; }
    .gate-card { padding: 32px 24px 28px; }
  }
</style>
</head>
<body>

<div id="gate">
  <div class="gate-bg">
    <div class="gate-blob gb1"></div>
    <div class="gate-blob gb2"></div>
    <div class="gate-blob gb3"></div>
    <svg class="gate-deco-tl" width="48" height="48" viewBox="0 0 48 48" fill="none">
      <path d="M24 3 L26 22 L45 24 L26 26 L24 45 L22 26 L3 24 L22 22 Z" stroke="#C9A96E" stroke-width="1" fill="none"/>
    </svg>
    <svg class="gate-deco-br" width="80" height="40" viewBox="0 0 80 40" fill="none">
      <path d="M4 20 Q20 4 40 20 Q60 36 76 20" stroke="#C9A96E" stroke-width="1" fill="none"/>
      <path d="M12 28 Q28 12 48 28" stroke="#C9A96E" stroke-width="0.8" fill="none" opacity="0.5"/>
    </svg>
  </div>

  <div class="gate-card">
    <div class="gate-logo">amenitiz</div>
    <div class="gate-title">Career Compass</div>
    <div class="gate-sub">Sign in with your Amenitiz email to access your career framework.</div>

    <div class="gate-field">
      <label class="gate-label" for="gate-email">Work email</label>
      <input class="gate-input" type="email" id="gate-email" placeholder="you@amenitiz.com" autocomplete="email">
    </div>

    <div class="gate-field">
      <label class="gate-label" for="gate-password">Password</label>
      <input class="gate-input" type="password" id="gate-password" placeholder="••••••••••••" autocomplete="current-password">
    </div>

    <div class="gate-error" id="gate-error"></div>

    <button class="gate-btn" id="gate-submit">Access Career Compass</button>

    <div class="gate-hint">Access restricted to @amenitiz.com accounts</div>
  </div>
</div>

<!-- ── APP ── -->
<div id="app">

<header>
  <div class="header-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <svg class="deco-svg" width="60" height="60" viewBox="0 0 60 60" fill="none">
      <path d="M30 4 L32 28 L56 30 L32 32 L30 56 L28 32 L4 30 L28 28 Z" stroke="#C9A96E" stroke-width="1" fill="none" opacity="0.6"/>
    </svg>
  </div>
  <div class="header-inner">
    <div class="logo">amenitiz</div>
    <div class="header-right">
      <div class="header-tag">career compass — onboarding</div>
      <button class="logout-btn" id="logout-btn">sign out</button>
    </div>
  </div>
</header>

<div class="container">

  <div class="selector-wrap">
    <div class="section-label">select your role</div>
    <div class="role-groups" id="roleGroups"></div>
  </div>

  <div class="journey-card">
    <div class="blob jb1"></div>
    <div class="blob jb2"></div>
    <svg class="journey-deco" width="50" height="50" viewBox="0 0 50 50" fill="none">
      <path d="M10 25 Q18 8 25 25 Q32 42 40 25" stroke="#C9A96E" stroke-width="1.2" fill="none"/>
      <path d="M15 35 Q22 18 30 35" stroke="#C9A96E" stroke-width="1" fill="none" opacity="0.5"/>
    </svg>
    <div class="journey-label">your career path</div>
    <div class="journey" id="journey"></div>
  </div>

  <div class="role-summary" id="roleSummary"></div>

  <div class="legend">
    <div class="leg"><div class="ldot" style="background:#EEF4FF;border:1px solid #7BA3EF"></div>universal competency</div>
    <div class="leg"><div class="ldot" style="background:#EDF4FF;border:1px solid #507FE6"></div>role-specific</div>
    <div class="leg"><div class="ldot" style="background:#FFF8ED;border:1px solid #C9A96E"></div>seniority-gated</div>
    <div class="leg"><div class="ldot" style="background:#E8D5B0;border:1px solid #C9A96E"></div>new at next level</div>
  </div>

  <div class="comparison" id="comparison"></div>

</div>
</div>

<script>
// ── AUTH ──────────────────────────────────────────────────────────────────────
const PASS = 'Raisethebar';
const DOMAIN = '@amenitiz.com';
const SESSION_KEY = 'cc_auth';

function checkSession() {
  return sessionStorage.getItem(SESSION_KEY) === '1';
}

function unlock() {
  sessionStorage.setItem(SESSION_KEY, '1');
  document.getElementById('gate').classList.add('hidden');
  document.getElementById('app').classList.add('visible');
}

function lock() {
  sessionStorage.removeItem(SESSION_KEY);
  document.getElementById('gate').classList.remove('hidden');
  document.getElementById('app').classList.remove('visible');
  document.getElementById('gate-email').value = '';
  document.getElementById('gate-password').value = '';
  document.getElementById('gate-error').textContent = '';
}

document.getElementById('gate-submit').addEventListener('click', function() {
  const email = document.getElementById('gate-email').value.trim().toLowerCase();
  const pass  = document.getElementById('gate-password').value;
  const errEl = document.getElementById('gate-error');
  const emailEl = document.getElementById('gate-email');
  const passEl  = document.getElementById('gate-password');

  emailEl.classList.remove('error');
  passEl.classList.remove('error');
  errEl.textContent = '';

  if (!email.endsWith(DOMAIN)) {
    emailEl.classList.add('error');
    errEl.textContent = 'Please use your @amenitiz.com email address.';
    return;
  }
  if (pass !== PASS) {
    passEl.classList.add('error');
    errEl.textContent = 'Incorrect password. Please try again.';
    return;
  }
  unlock();
});

// Allow Enter key on both fields
['gate-email','gate-password'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('gate-submit').click();
  });
});

document.getElementById('logout-btn').addEventListener('click', lock);

// Check existing session on load
if (checkSession()) unlock();

// ── APP ───────────────────────────────────────────────────────────────────────

const U="Universal",R="Role-specific",S="Seniority-gated";

const roles={
  ic1:{label:"Customer Onboarding Associate",level:"IC1",track:"IC",
    nextId:"ic2",nextLabel:"Customer Onboarding Specialist",nextLevel:"IC2",
    journeyIds:["ic1","ic2","ic3ob","m3tl","m4mgr","m5"],
    summary:"Supports the onboarding team by handling basic customer tasks with guidance. Learns the Amenitiz platform and begins building customer-facing skills under supervision.",
    competencies:[
      {name:"Customer Centricity",type:U,now:"Listens actively to customers and tries to understand their needs with manager support. Focuses on making a positive first impression.",next:"Actively listens to customer feedback, understands customer needs and independently focuses on delivering value throughout the onboarding journey."},
      {name:"Operational Excellence",type:U,now:"Completes assigned tasks with guidance. Meets deadlines and pays attention to detail. Follows established onboarding processes.",next:"Completes tasks on time independently. Prioritises daily workload, understands workflows and identifies basic inefficiencies."},
      {name:"Business Acumen",type:U,now:"Knows the basic company structure. Begins to understand what onboarding success means for Amenitiz and the customer.",next:"Understands key SaaS and hospitality metrics. Recognises how onboarding quality directly impacts customer retention and satisfaction."},
      {name:"Product & Platform Expertise",type:R,now:"Demonstrates basic understanding of Amenitiz product features and use cases. Can communicate the core value proposition with support.",next:"Demonstrates functional understanding of the platform to guide customers through standard onboarding tasks. Handles basic product questions independently."},
      {name:"Onboarding Delivery",type:R,now:"Supports the delivery of basic onboarding tasks under supervision. Follows defined checklists and processes to help customers get started.",next:"Independently manages standard customer onboarding tasks from start to finish. Ensures customers complete key setup milestones on time."},
      {name:"Quality Focus",type:R,now:"Completes tasks according to defined quality standards. Identifies and reports quality issues in own outputs.",next:"Ensures own deliverables consistently meet quality standards. Proactively flags issues and proposes simple improvements."},
    ]},

  ic2:{label:"Customer Onboarding Specialist",level:"IC2",track:"IC",
    nextId:"ic3ob",nextLabel:"Sr Customer Onboarding Specialist",nextLevel:"IC3",
    journeyIds:["ic1","ic2","ic3ob","m3tl","m4mgr","m5"],
    summary:"Guides customers through a seamless onboarding experience, ensuring they understand the value of Amenitiz from day one. Builds strong customer relationships and drives product adoption.",
    competencies:[
      {name:"Customer Centricity",type:U,now:"Actively listens to customer feedback, understands customer needs and focuses on delivering value throughout the onboarding journey.",next:"Proactively anticipates customer needs and goes beyond the immediate request to ensure long-term satisfaction and adoption."},
      {name:"Operational Excellence",type:U,now:"Completes tasks on time independently. Prioritises daily workload, understands workflows and identifies basic inefficiencies.",next:"Optimises own onboarding workflows. Balances multiple customer accounts efficiently and proposes process improvements."},
      {name:"Business Acumen",type:U,now:"Understands key SaaS and hospitality metrics. Recognises how onboarding quality directly impacts customer retention and satisfaction.",next:"Applies SaaS and hospitality metrics to guide onboarding conversations. Uses business context to prioritise customer needs and drive adoption."},
      {name:"Product & Platform Expertise",type:R,now:"Demonstrates functional understanding of the platform to guide customers through standard onboarding tasks. Handles basic product questions independently.",next:"Applies in-depth product knowledge to resolve complex customer situations. Tailors platform guidance to each customer's specific business context and goals."},
      {name:"Onboarding Delivery",type:R,now:"Independently manages standard customer onboarding tasks from start to finish. Ensures customers complete key setup milestones on time.",next:"Manages a portfolio of onboarding accounts with autonomy. Adapts the onboarding approach to different customer profiles and complexity levels."},
      {name:"Customer Communication & Trust",type:R,now:"Communicates clearly and professionally with customers. Builds initial rapport and addresses questions with empathy and confidence.",next:"Acts as a trusted advisor during onboarding. Handles escalations calmly, manages expectations proactively and builds lasting customer relationships."},
      {name:"Customer Training & Enablement",type:R,now:"Delivers pre-designed training sessions to help customers use the platform. Gathers learner feedback to identify areas for improvement.",next:"Designs and facilitates training sessions tailored to specific customer needs. Uses a variety of methods to maximise engagement and platform adoption."},
      {name:"Retention & Churn Prevention",type:S,now:"Builds strong relationships with customers to enhance satisfaction. Flags early signs of disengagement or risk to the team lead.",next:"Proactively identifies at-risk accounts and implements targeted interventions. Uses data and customer signals to prevent churn during the onboarding phase."},
      {name:"Quality Focus",type:R,now:"Ensures own deliverables consistently meet quality standards. Proactively flags issues and proposes simple improvements.",next:"Ensures deliverables consistently exceed standards. Supports peers on quality processes and contributes to best practice documentation."},

];

function badge(type){
  if(type===U)return'<span class="badge b-u">universal</span>';
  if(type===R)return'<span class="badge b-r">role-specific</span>';
  return'<span class="badge b-s">seniority-gated</span>';
}

function render(roleId){
  const role=roles[roleId];
  document.querySelectorAll('.role-btn').forEach(b=>b.classList.toggle('active',b.dataset.id===roleId));
  const jEl=document.getElementById('journey');
  jEl.innerHTML='';
  const ids=role.journeyIds;
  const ci=ids.indexOf(roleId);
  ids.forEach((id,i)=>{
    const r=roles[id];
    const cls=i<ci?'j-past':i===ci?'j-current':i===ci+1?'j-next':'j-future';
    const lc=i===ci?'current':i===ci+1?'next':'';
    jEl.innerHTML+=`<div class="jstep"><div class="jcircle ${cls}">${r.level}</div><div class="jlabel ${lc}">${r.label}</div></div>`;
    if(i<ids.length-1) jEl.innerHTML+=`<div class="jarrow ${i===ci?'active':''}"></div>`;
  });
  document.getElementById('roleSummary').innerHTML=`<strong>${role.label} — ${role.level} · ${role.track==='Manager'?'manager track':'IC track'}</strong>${role.summary}`;
  const nextLabel=role.nextId?`${role.nextLabel} — ${role.nextLevel}`:`${role.nextLabel}`;
  let nowRows='',nextRows='';
  role.competencies.forEach(c=>{
    const isNA=c.now.startsWith('Not yet applicable');
    nowRows+=`<div class="comp-row"><div class="comp-name">${c.name} ${badge(c.type)}</div><div class="${isNA?'comp-na':'comp-desc'}">${c.now}</div></div>`;
    nextRows+=`<div class="comp-row"><div class="comp-name">${c.name}${c.nextNew?' <span class="badge b-new">new</span>':''}</div><div class="comp-desc">${c.next}</div></div>`;
  });
  document.getElementById('comparison').innerHTML=`
    <div>
      <div class="col-header col-now">${role.label} — ${role.level} · now</div>
      <div class="col-body">${nowRows}</div>
    </div>
    <div>
      <div class="col-header col-next">${nextLabel} · next</div>
      <div class="col-body">${nextRows}</div>
    </div>`;
}

const groupsEl=document.getElementById('roleGroups');
groups.forEach(g=>{
  const row=document.createElement('div');
  row.className='role-group';
  row.innerHTML=`<span class="group-tag">${g.tag}</span>`;
  g.ids.forEach(id=>{
    const r=roles[id];
    const btn=document.createElement('button');
    btn.className='role-btn';
    btn.dataset.id=id;
    btn.textContent=`${r.label} (${r.level})`;
    btn.onclick=()=>render(id);
    row.appendChild(btn);
  });
  groupsEl.appendChild(row);
});

render('ic2');
